<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travelo - Create Account</title>

    <!-- GOOGLE FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- FONT AWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            min-height: 100vh;
            background:
                linear-gradient(rgba(4, 18, 24, 0.75),
                    rgba(4, 18, 24, 0.8)),
                url("https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=2070&auto=format&fit=crop");

            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
            position: relative;
        }

        /* GLOW */

        .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
        }

        .glow1 {
            width: 350px;
            height: 350px;
            background: #00c2a8;
            top: -100px;
            left: -100px;
            opacity: 0.5;
        }

        .glow2 {
            width: 300px;
            height: 300px;
            background: #007f73;
            bottom: -80px;
            right: -80px;
            opacity: 0.5;
        }

        /* MAIN BOX */

        .signin-container {
            width: 100%;
            max-width: 1050px;
            min-height: 650px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(22px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 35px;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
            position: relative;
            z-index: 2;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.45);
        }

        /* LEFT SIDE */

        .left-side {
            padding: 50px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* LOGO */

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 35px;
        }

        .logo-icon {
            width: 58px;
            height: 58px;
            border-radius: 18px;
            background: linear-gradient(135deg, #0F766E, #14B8A6);
            display: flex;
            justify-content: center;
            align-items: center;
            transform: rotate(-8deg);
            box-shadow: 0 8px 20px rgba(15, 118, 110, 0.35);
            transition: 0.4s;
        }

        .logo-icon i {
            color: white;
            font-size: 24px;
            transform: rotate(8deg);
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1;
        }

        .logo-text span {
            font-size: 32px;
            font-weight: 800;
            color: white;
            letter-spacing: 1px;
        }

        .logo-text small {
            font-size: 10px;
            color: #bff7f2;
            letter-spacing: 2px;
            margin-top: 4px;
            text-transform: uppercase;
        }

        .logo:hover .logo-icon {
            transform: rotate(0deg) scale(1.08);
        }

        /* CONTENT */

        .hero-content h1 {
            font-size: 58px;
            line-height: 1.1;
            margin-bottom: 25px;
            font-weight: 800;
        }

        .hero-content p {
            max-width: 500px;
            color: #d9f7f3;
            line-height: 1.8;
            font-size: 15px;
        }

        .tag {
            display: inline-block;
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 50px;
            font-size: 13px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        /* RIGHT SIDE */

        .right-side {
            background: rgba(255, 255, 255, 0.96);
            padding: 55px;
            display: flex;
            justify-content: center;
            flex-direction: column;
        }

        .form-title h2 {
            font-size: 40px;
            color: #111;
            margin-bottom: 10px;
        }

        .form-title p {
            color: #666;
            margin-bottom: 35px;
        }

        /* INPUTS */

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group input {
            width: 100%;
            height: 60px;
            border-radius: 18px;
            border: 2px solid transparent;
            background: #f3f7f7;
            padding: 0 20px 0 58px;
            outline: none;
            font-size: 15px;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #00c2a8;
            background: white;
            box-shadow: 0 0 0 5px rgba(0, 194, 168, 0.1);
        }

        .input-group i {
            position: absolute;
            top: 50%;
            left: 22px;
            transform: translateY(-50%);
            color: #007f73;
            font-size: 18px;
        }

        .options {
            margin-bottom: 24px;
            font-size: 14px;
            color: #555;
        }

        /* BUTTON */

        .signin-btn {
            width: 100%;
            height: 60px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(135deg, #00c2a8, #007f73);
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 15px 30px rgba(0, 127, 115, 0.3);
        }

        .signin-btn:hover {
            transform: translateY(-4px);
        }

        /* DIVIDER */

        .divider {
            margin: 28px 0;
            text-align: center;
            color: #777;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: "";
            position: absolute;
            width: 32%;
            height: 1px;
            background: #ddd;
            top: 50%;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        /* SOCIAL */

        .social-buttons {
            display: flex;
            gap: 15px;
        }

        .social-btn {
            flex: 1;
            height: 56px;
            border-radius: 16px;
            border: 1px solid #ddd;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 500;
        }

        .social-btn:hover {
            border-color: #00c2a8;
            background: #f4fffd;
        }

        /* BOTTOM */

        .create-account {
            margin-top: 28px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        .create-account a {
            color: #007f73;
            text-decoration: none;
            font-weight: 600;
        }

        /* RESPONSIVE */

        @media(max-width: 980px) {

            .signin-container {
                grid-template-columns: 1fr;
            }

            .left-side {
                display: none;
            }

            .right-side {
                padding: 40px 25px;
            }
        }
    </style>
</head>

<body>

    <div class="glow glow1"></div>
    <div class="glow glow2"></div>

    <div class="signin-container">

        <!-- LEFT -->

        <div class="left-side">

            <div class="logo">

                <div class="logo-icon">
                    <i class="fa-solid fa-plane"></i>
                </div>

                <div class="logo-text">
                    <span>Travelo</span>
                    <small>Explore World</small>
                </div>

            </div>

            <div class="hero-content">



                <h1>
                    Start Your <br>
                    Dream Journey
                </h1>

                <p>
                    Create your Travelo account and unlock premium
                    destinations, luxury adventures and unforgettable experiences.
                </p>

            </div>

        </div>

        <!-- RIGHT -->

        <div class="right-side">

            <div class="form-title">
                <h2>Create Account</h2>
                <p>Join Travelo and explore the world with style.</p>
            </div>

            <form>

                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" placeholder="Full Name">
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" placeholder="Enter your email">
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="Create password">
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="Confirm password">
                </div>

                <div class="options">
                    <label>
                        <input type="checkbox">
                        I agree to Terms & Privacy
                    </label>
                </div>

                <button class="signin-btn">
                    Create Account
                </button>

                <div class="divider">
                    Or Continue With
                </div>

                <div class="social-buttons">

                    <div class="social-btn">
                        <i class="fa-brands fa-google"></i>
                        Google
                    </div>

                    <div class="social-btn">
                        <i class="fa-brands fa-apple"></i>
                        Apple
                    </div>

                </div>

                <div class="create-account">
                    Already have an account?
                    <a href="Register.html" style="font-weight:600; color:#007f73;">Sign In</a>
                </div>

            </form>

        </div>

    </div>

</body>

</html>
