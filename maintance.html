<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travelo - Maintenance</title>

    <!-- GOOGLE FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- FONT AWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        body {
            background: #F6FBFB;
            overflow-x: hidden;
            color: #121212;
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }

        :root {
            --primary: #0F766E;
            --secondary: #134E4A;
            --light: #ECFEFF;
            --white: #ffffff;
            --dark: #121212;
        }

        /* MAINTENANCE SECTION */

        .maintenance-section {
            min-height: 100vh;

            background:
                linear-gradient(rgba(0, 0, 0, 0.65),
                    rgba(0, 0, 0, 0.65)),
                url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=1600&auto=format&fit=crop');

            background-size: cover;
            background-position: center;

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 40px 8%;
        }

        .maintenance-card {
            width: 100%;
            max-width: 900px;

            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(18px);

            border: 1px solid rgba(255, 255, 255, 0.12);

            border-radius: 35px;

            padding: 70px 50px;

            text-align: center;

            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
        }

        .maintenance-icon {
            width: 120px;
            height: 120px;

            margin: auto auto 35px;

            border-radius: 30px;

            background: linear-gradient(135deg, #0F766E, #14B8A6);

            display: flex;
            justify-content: center;
            align-items: center;

            transform: rotate(-8deg);

            box-shadow: 0 10px 30px rgba(15, 118, 110, 0.4);

            animation: float 3s ease-in-out infinite;
        }

        .maintenance-icon i {
            color: white;
            font-size: 48px;
            transform: rotate(8deg);
        }

        @keyframes float {

            0%,
            100% {
                transform: rotate(-8deg) translateY(0);
            }

            50% {
                transform: rotate(-8deg) translateY(-10px);
            }
        }

        .maintenance-card h1 {
            font-size: 68px;
            line-height: 1.1;
            margin-bottom: 25px;

            background: linear-gradient(to right, #fff, #bff7f2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .maintenance-card p {
            font-size: 18px;
            line-height: 1.9;
            color: #ffffff;
            max-width: 750px;
            margin: auto auto 45px;
        }

        /* COUNTDOWN */

        .countdown {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 22px;

            margin-bottom: 45px;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 26px;
            padding: 30px 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .time-box h2 {
            font-size: 48px;
            color: white;
            margin-bottom: 10px;
        }

        .time-box span {
            color: #bff7f2;
            letter-spacing: 1px;
            font-size: 14px;
        }

        /* BUTTONS */

        .maintenance-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .primary-btn,
        .secondary-btn {
            padding: 16px 34px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .primary-btn {
            background: var(--primary);
            color: white;
        }

        .secondary-btn {
            background: white;
            color: black;
        }

        .primary-btn:hover,
        .secondary-btn:hover {
            transform: translateY(-5px);
        }

        /* MOBILE */

        @media (max-width: 768px) {

            .maintenance-card {
                padding: 45px 24px;
            }

            .maintenance-card h1 {
                font-size: 42px;
            }

            .maintenance-card p {
                font-size: 15px;
            }

            .maintenance-icon {
                width: 90px;
                height: 90px;
            }

            .maintenance-icon i {
                font-size: 38px;
            }

            .time-box h2 {
                font-size: 34px;
            }
        }
    </style>
</head>

<body>




    <!-- MAINTENANCE SECTION -->

    <section class="maintenance-section">

        <div class="maintenance-card">

            <div class="maintenance-icon">
                <i class="fa-solid fa-screwdriver-wrench"></i>
            </div>

            <h1>Website Under Maintenance</h1>

            <p>
                We’re currently upgrading Travelo to bring you a better luxury travel experience.
                Our team is working hard to improve booking, destinations, and performance.
                Please check back soon.
            </p>

            <!-- COUNTDOWN -->

            <div class="countdown">

                <div class="time-box">
                    <h2 id="days">02</h2>
                    <span>DAYS</span>
                </div>

                <div class="time-box">
                    <h2 id="hours">12</h2>
                    <span>HOURS</span>
                </div>

                <div class="time-box">
                    <h2 id="minutes">45</h2>
                    <span>MINUTES</span>
                </div>

                <div class="time-box">
                    <h2 id="seconds">30</h2>
                    <span>SECONDS</span>
                </div>

            </div>

            <!-- BUTTONS -->

            <div class="maintenance-buttons">

                <a href="index.html">
                    <button class="primary-btn">
                        Back To Home
                    </button>
                </a>

                <a href="contact.html">
                    <button class="secondary-btn">
                        Contact Support
                    </button>
                </a>

            </div>

        </div>

    </section>


    <!-- COUNTDOWN SCRIPT -->

    <script>

        const targetDate = new Date().getTime() + (2 * 24 * 60 * 60 * 1000);

        const timer = setInterval(() => {

            const now = new Date().getTime();

            const distance = targetDate - now;

            const days =
                Math.floor(distance / (1000 * 60 * 60 * 24));

            const hours =
                Math.floor((distance %
                    (1000 * 60 * 60 * 24))
                    / (1000 * 60 * 60));

            const minutes =
                Math.floor((distance %
                    (1000 * 60 * 60))
                    / (1000 * 60));

            const seconds =
                Math.floor((distance %
                    (1000 * 60))
                    / 1000);

            document.getElementById("days").innerHTML = days;

            document.getElementById("hours").innerHTML = hours;

            document.getElementById("minutes").innerHTML = minutes;

            document.getElementById("seconds").innerHTML = seconds;

            if (distance < 0) {

                clearInterval(timer);

                document.querySelector(".countdown").innerHTML =
                    "<h2 style='color:white;'>Website Is Live Now!</h2>";
            }

        }, 1000);

    </script>

</body>

</html>
