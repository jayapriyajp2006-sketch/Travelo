<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travelo Booking</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Poppins;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                linear-gradient(120deg, rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)),
                url("https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=2070&auto=format&fit=crop");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding: 20px;
        }

        /* MAIN */
        .container {
            width: 100%;
            max-width: 1150px;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            border-radius: 22px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(22px);
        }

        /* LEFT */
        .left {
            position: relative;
            color: white;
            min-height: 650px;
        }

        .left img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.55);
        }

        .overlay {
            position: relative;
            z-index: 2;
            padding: 30px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .badge {
            font-size: 11px;
            background: rgba(255, 255, 255, 0.15);
            padding: 5px 10px;
            border-radius: 20px;
            width: fit-content;
        }

        .title {
            font-size: 30px;
            font-weight: 600;
            margin-top: 10px;
        }

        .sub {
            font-size: 12px;
            margin-top: 6px;
            opacity: 0.9;
        }

        .info-grid {
            display: flex;
            gap: 15px;
            margin-top: 12px;
            font-size: 12px;
        }

        /* RIGHT */

        .right {

            background: #ffffff;

            padding: 42px 35px;

            display: flex;
            flex-direction: column;
            justify-content: center;

            min-height: 100%;

            overflow-y: auto;
        }

        /* SECTION TITLE */

        .section-title {

            font-size: 13px;

            margin: 18px 0 10px;

            font-weight: 600;

            border-left: 3px solid #00c2a8;

            padding-left: 8px;

            color: #222;
        }

        /* GRID */

        .grid {

            display: grid;

            grid-template-columns: 1fr 1fr;

            gap: 12px;
        }

        /* INPUT BOX */

        .input {

            display: flex;

            align-items: center;

            background: #f4f7f7;

            padding: 12px 14px;

            border-radius: 12px;

            font-size: 13px;

            min-height: 52px;

            transition: 0.3s;
        }

        .input:hover {

            background: #eef9f7;
        }

        .input i {

            margin-right: 10px;

            color: #007f73;

            font-size: 14px;
        }

        .input input,
        .input select {

            border: none;

            outline: none;

            width: 100%;

            font-size: 13px;

            background: transparent;

            color: #222;
        }

        /* button */
        .btn {
            width: 100%;
            padding: 11px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #00c2a8, #007f73);
            color: white;
            font-size: 12px;
            font-weight: 600;
        }

        /* SUMMARY FIXED */
        /* SUMMARY */

        .summary-box {

            margin-top: 15px;

            background: #f6fffd;

            padding: 16px;

            border-radius: 14px;

            font-size: 13px;

            border: 1px solid #dff5f1;

            line-height: 2;
        }

        .summary-box p {

            display: flex;

            justify-content: space-between;

            align-items: center;
        }

        .confirm-popup {
            position: fixed;
            inset: 0;
            background: rgba(4, 18, 24, 0.55);
            backdrop-filter: blur(10px);

            display: flex;
            justify-content: center;
            align-items: center;

            opacity: 0;
            visibility: hidden;
            transition: 0.35s ease;

            z-index: 9999;
        }

        .confirm-popup.active {
            opacity: 1;
            visibility: visible;
        }

        /* POPUP BOX */
        .confirm-box {
            width: 90%;
            max-width: 380px;

            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);

            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 22px;

            padding: 28px;
            text-align: center;

            color: #000000;

            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);

            transform: scale(0.9);
            animation: pop 0.35s ease forwards;
        }

        /* ANIMATION */
        @keyframes pop {
            to {
                transform: scale(1);
            }
        }

        /* ICON */
        .confirm-icon {
            width: 70px;
            height: 70px;
            margin: 0 auto 15px;

            background: linear-gradient(135deg, #00c2a8, #007f73);
            border-radius: 50%;

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 28px;
            color: white;
        }

        /* TEXT */
        .confirm-box h2 {
            font-size: 20px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .confirm-box p {
            font-size: 12px;
            opacity: 0.85;
            line-height: 1.6;
            margin-bottom: 18px;
        }

        /* BUTTON */
        .confirm-box button {
            padding: 10px 18px;
            border: none;
            border-radius: 12px;

            background: linear-gradient(135deg, #00c2a8, #007f73);
            color: white;

            font-size: 12px;
            font-weight: 600;

            cursor: pointer;
            transition: 0.3s;
        }

        .confirm-box button:hover {
            transform: translateY(-2px);
        }

        .confirm-box {
            width: 320px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;

            animation: pop 0.35s ease;
        }

        @keyframes pop {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .confirm-box .icon {
            font-size: 50px;
            color: #00c2a8;
            margin-bottom: 10px;
        }

        .confirm-box h2 {
            font-size: 20px;
            margin-bottom: 8px;
        }

        .confirm-box p {
            font-size: 12px;
            color: #666;
            margin-bottom: 15px;
        }

        .confirm-box button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #00c2a8, #007f73);
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .popup {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .popup.active {
            display: flex;
        }

        .popup-box {
            width: 320px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;

            animation: pop 0.35s ease;
        }

        /* MOBILE */
        @media(max-width:768px) {

            .container {

                grid-template-columns: 1fr;
            }

            .left {

                min-height: 320px;
            }

            .title {

                font-size: 24px;
            }

            .grid {

                grid-template-columns: 1fr;
            }

            .right {

                justify-content: flex-start;

                padding: 28px 18px;
            }

            .section-title {

                margin-top: 16px;
            }

            .input {

                min-height: 50px;
            }
        }

        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 18px;
            z-index: 10;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #00c2a8;
            transform: translateY(-3px);
        }


        @media(max-width:768px) {
            .back-btn {
                top: 12px;
                left: 12px;
                font-size: 11px;
            }
        }
    </style>
</head>

<body>
    <a href="javascript:history.back()" class="back-btn">
        <i class="fa fa-arrow-left"></i>
    </a>
    <div class="container">

        <!-- LEFT -->
        <div class="left">
            <img id="bookImg">
            <div class="overlay">
                <div class="badge">Selected Destination</div>
                <div class="title" id="name"></div>
                <div class="sub" id="desc"></div>

                <div class="info-grid">
                    <div> <span id="price"></span></div>
                </div>
            </div>
        </div>

        <!-- RIGHT -->
        <div class="right">

            <div class="section-title">Destination</div>
            <div class="grid">
                <div class="input">
                    <i class="fa fa-location-dot"></i>
                    <input id="destination" readonly>
                </div>

                <div class="input">
                    <i class="fa fa-calendar"></i>
                    <input type="date">
                </div>
            </div>

            <div class="section-title">Traveler Details</div>
            <div class="grid">

                <div class="input">
                    <i class="fa fa-user"></i>
                    <input id="nameInput" placeholder="Full Name">
                </div>

                <div class="input">
                    <i class="fa fa-users"></i>
                    <select id="guests">
                        <option>1 Guest</option>
                        <option>2 Guests</option>
                        <option>3 Guests</option>
                        <option>4+ Guests</option>
                    </select>
                </div>

            </div>

            <div class="section-title">Travel Options</div>
            <div class="grid">

                <div class="input">
                    <i class="fa fa-plane"></i>
                    <select id="travelClass">
                        <option>Economy</option>
                        <option>Premium</option>
                        <option>Business</option>
                    </select>
                </div>

                <div class="input">
                    <i class="fa fa-hotel"></i>
                    <select id="hotel">
                        <option>3 Star</option>
                        <option>4 Star</option>
                        <option>5 Star</option>
                    </select>
                </div>

            </div>

            <div class="section-title">Payment</div>
            <div class="grid">

                <div class="input">
                    <i class="fa fa-credit-card"></i>
                    <select id="payment">
                        <option>UPI</option>
                        <option>Card</option>
                        <option>Net Banking</option>
                    </select>
                </div>

                <div class="input">
                    <i class="fa fa-lock"></i>
                    <input placeholder="UPI / Card No">
                </div>

            </div>



            <!-- SUMMARY FIXED HERE -->
            <div class="section-title">Booking Summary</div>

            <div class="summary-box">
                <p><b>Destination:</b> <span id="s_dest"></span></p>
                <p><b>Guests:</b> <span id="s_guest"></span></p>
                <p><b>Class:</b> <span id="s_class"></span></p>
                <p><b>Hotel:</b> <span id="s_hotel"></span></p>
                <p><b>Payment:</b> <span id="s_pay"></span></p>
                <hr style="margin:8px 0">
                <p style="font-weight:700;color:#007f73">
                    Total: <span id="s_price"></span>
                </p>
            </div>
            <!-- CONFIRM BUTTON (NOW BELOW SUMMARY) -->
            <button class="btn" onclick="confirmBooking()">Confirm Booking</button>
        </div>
    </div>
    <!-- CONFIRM POPUP -->
    <div class="confirm-popup" id="confirmPopup">

        <div class="confirm-box">

            <div class="confirm-icon">
                <i class="fa-solid fa-check"></i>
            </div>

            <h2>Booking Confirmed</h2>

            <p>
                Your trip has been successfully booked.<br>
                We will send details to your email shortly.
            </p>

            <button onclick="closePopup()">OK</button>

        </div>

    </div>
    <script>

        let destination = JSON.parse(localStorage.getItem("selectedDestination"));

        if (!destination) {
            destination = {
                name: "Canada",
                img: "https://images.unsplash.com/photo-1503614472-8c93d56e92ce",
                price: "95000",
                desc: "Default destination",
                tag: "Nature"
            };
        }

        /* LOAD DESTINATION */
        function loadDestination() {

            document.getElementById("bookImg").src = destination.img;

            document.getElementById("name").innerText = destination.name;

            document.getElementById("desc").innerText = destination.desc;

            document.getElementById("price").innerText =
                "₹" + destination.price;

            document.getElementById("destination").value =
                destination.name;
        }

        loadDestination();

        /* SUMMARY */
        function updateSummary() {

            let basePrice =
                parseInt(destination.price);

            let guestsText =
                document.getElementById("guests").value;

            let guests =
                parseInt(guestsText);

            let travelClass =
                document.getElementById("travelClass").value;

            let hotel =
                document.getElementById("hotel").value;

            let payment =
                document.getElementById("payment").value;

            let classMultiplier = 1;

            if (travelClass === "Premium")
                classMultiplier = 1.3;

            if (travelClass === "Business")
                classMultiplier = 1.6;

            let hotelMultiplier = 1;

            if (hotel === "4 Star")
                hotelMultiplier = 1.2;

            if (hotel === "5 Star")
                hotelMultiplier = 1.5;

            let total =
                basePrice *
                guests *
                classMultiplier *
                hotelMultiplier;

            document.getElementById("s_dest").innerText =
                destination.name;

            document.getElementById("s_guest").innerText =
                guestsText;

            document.getElementById("s_class").innerText =
                travelClass;

            document.getElementById("s_hotel").innerText =
                hotel;

            document.getElementById("s_pay").innerText =
                payment;

            document.getElementById("s_price").innerText =
                "₹ " + Math.round(total);

            return Math.round(total);
        }

        /* LIVE UPDATE */
        document.querySelectorAll("select, input").forEach(el => {
            el.addEventListener("change", updateSummary);
        });

        updateSummary();

        /* CONFIRM BOOKING */
        function confirmBooking() {

            let totalAmount = updateSummary();

            const bookingData = {

                name: destination.name,
                img: destination.img,
                desc: destination.desc,
                price: destination.price,

                guests:
                    document.getElementById("guests").value,

                class:
                    document.getElementById("travelClass").value,

                hotel:
                    document.getElementById("hotel").value,

                payment:
                    document.getElementById("payment").value,

                total:
                    "₹ " + totalAmount
            };

            localStorage.setItem(
                "traveloBooking",
                JSON.stringify(bookingData)
            );

            document.getElementById("confirmPopup")
                .classList.add("active");
        }

        function closePopup() {

            document.getElementById("confirmPopup")
                .classList.remove("active");
        }

    </script>

</body>

</html>
