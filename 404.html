<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>404 - Page Not Found | Travelo</title>

    <!-- GOOGLE FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- FONT AWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        :root {
            --primary: #0F766E;
            --secondary: #134E4A;
            --light: #ECFEFF;
            --white: #ffffff;
            --dark: #121212;
        }

        body {
            min-height: 100vh;
            background:
                linear-gradient(rgba(0, 0, 0, 0.75),
                    rgba(0, 0, 0, 0.75)),
                url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1600&auto=format&fit=crop');

            background-size: cover;
            background-position: center;

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 30px;

            overflow: hidden;
        }

        .error-container {
            width: 100%;
            max-width: 850px;

            background: rgba(255, 255, 255, 0.08);

            border: 1px solid rgba(255, 255, 255, 0.08);

            backdrop-filter: blur(14px);

            border-radius: 40px;

            padding: 70px 50px;

            text-align: center;

            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);

            animation: fadeUp 1s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-icon {
            width: 110px;
            height: 110px;

            margin: auto auto 30px;

            border-radius: 30px;

            background: linear-gradient(135deg,
                    var(--primary),
                    #14B8A6);

            display: flex;
            justify-content: center;
            align-items: center;

            box-shadow: 0 20px 40px rgba(15, 118, 110, 0.35);

            transform: rotate(-8deg);
        }

        .error-icon i {
            font-size: 42px;
            color: white;
            transform: rotate(8deg);
        }

        .error-code {
            font-size: 140px;
            line-height: 1;
            font-weight: 800;

            background: linear-gradient(to right, white, #bff7f2);

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            margin-bottom: 10px;
        }

        .error-title {
            font-size: 42px;
            color: white;

            margin-bottom: 20px;
        }

        .error-text {
            color: #d6d6d6;

            font-size: 17px;
            line-height: 1.9;

            max-width: 650px;
            margin: auto auto 40px;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .home-btn,
        .explore-btn {
            padding: 16px 34px;

            border-radius: 50px;

            text-decoration: none;

            font-size: 15px;
            font-weight: 600;

            transition: 0.35s ease;
        }

        .home-btn {
            background: var(--primary);
            color: white;

            box-shadow: 0 15px 35px rgba(15, 118, 110, 0.35);
        }

        .explore-btn {
            background: rgba(255, 255, 255, 0.12);
            color: white;

            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .home-btn:hover,
        .explore-btn:hover {
            transform: translateY(-5px);
        }

        .home-btn:hover {
            background: #14B8A6;
        }

        .explore-btn:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        .floating-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(20, 184, 166, 0.08);
            animation: float 10s linear infinite;
        }

        .circle1 {
            width: 220px;
            height: 220px;
            top: -80px;
            left: -80px;
        }

        .circle2 {
            width: 300px;
            height: 300px;
            bottom: -120px;
            right: -120px;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(20px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        @media (max-width: 768px) {

            .error-container {
                padding: 50px 25px;
                border-radius: 28px;
            }

            .error-code {
                font-size: 90px;
            }

            .error-title {
                font-size: 30px;
            }

            .error-text {
                font-size: 15px;
            }

            .error-icon {
                width: 90px;
                height: 90px;
            }

            .error-icon i {
                font-size: 34px;
            }

            .home-btn,
            .explore-btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="floating-circle circle1"></div>
    <div class="floating-circle circle2"></div>

    <div class="error-container">

        <div class="error-icon">
            <i class="fa-solid fa-earth-americas"></i>
        </div>

        <h1 class="error-code">404</h1>

        <h2 class="error-title">
            Oops! Destination Not Found
        </h2>

        <p class="error-text">
            The page you are looking for might have been removed,
            renamed, or is temporarily unavailable.
            Let’s get you back on the right travel path.
        </p>



    </div>

</body>

</html>
